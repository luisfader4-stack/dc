<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Дивљи час</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: linear-gradient(145deg, #fbeaff, #e8f6ff);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

/* TARJETA PRINCIPAL */
.app {
  width: 100%;
  max-width: 900px;
  background: rgba(255,255,255,0.9);
  border-radius: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #d9a7ff, #a7d8ff);
  padding: 15px;
  text-align: center;
  font-weight: bold;
  color: #333;
  font-size: 18px;
}

/* CONTENIDO */
.content {
  padding: 20px;
}

/* PORTADA */
.cover {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  height: 200px;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(80%);
}

/* PLAYER SOBRE IMAGEN */
.player-overlay {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
}

audio {
  width: 100%;
}

/* VISUALIZER */
#visualizer {
  width: 100%;
  height: 80px;
  margin-top: 15px;
  border-radius: 12px;
}

/* PLAYLIST */
.playlist {
  margin-top: 20px;
}

.song {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  background: #f3eaff;
  cursor: pointer;
  transition: 0.2s;
}

.song:hover {
  background: #e6d4ff;
}

.song.active {
  background: #d9a7ff;
  color: #fff;
}

/* LETRAS */
.lyrics {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: #f9f9ff;
  max-height: 300px;
  overflow-y: auto;
  line-height: 1.8;
}

.stanza {
  margin-bottom: 18px;
}

.line {
  margin-bottom: 5px;
}

/* MÓVIL */
@media (max-width: 600px) {
  .cover {
    height: 160px;
  }

  .lyrics {
    max-height: none;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    🎵 Дивљи час · Музика
  </div>

  <div class="content">

    <!-- PORTADA -->
    <div class="cover">
      <img src="img/cover.png">

      <div class="player-overlay">
        <audio id="audio" controls></audio>
      </div>
    </div>

    <!-- VISUALIZER -->
    <canvas id="visualizer"></canvas>

    <!-- PLAYLIST -->
    <div class="playlist">
      <div class="song" data-src="/dc/music/dirizabli.mp3" data-lyrics="lyrics/dirizabli.txt">
        🎵 Дирижабли над Дунавом
      </div>

      <div class="song" data-src="/dc/music/kralica.mp3" data-lyrics="lyrics/kralica.txt">
        👑 Кралица
      </div>

      <div class="song" data-src="/dc/music/sudbino.mp3" data-lyrics="lyrics/sudbino.txt">
        🔥 Судбина моја
      </div>
    </div>

    <!-- LETRAS -->
    <div id="lyrics" class="lyrics">
      Изабери песму 👆
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
