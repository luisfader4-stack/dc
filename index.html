<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Дивљи час</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <!-- IZQUIERDA -->
  <div class="left">

    <div class="cover">
      <img src="img/cover.png" alt="cover">

      <!-- PLAYER SOBRE LA IMAGEN -->
      <div class="player-overlay">
        <audio id="audio" controls></audio>
      </div>
    </div>

    <!-- VISUALIZER -->
    <canvas id="visualizer"></canvas>

    <!-- PLAYLIST -->
    <ul id="playlist">
      <li data-src="music/dirizabli.mp3" data-lyrics="lyrics/dirizabli.txt">
        Дирижабли над Дунавом
      </li>

      <li data-src="music/kralica.mp3" data-lyrics="lyrics/kralica.txt">
        Кралица
      </li>

      <li data-src="music/sudbino.mp3" data-lyrics="lyrics/sudbino.txt">
        Судбина моја
      </li>
    </ul>

  </div>

  <!-- DERECHA -->
  <div class="right">
    <h2 id="song-title">Selecciona una canción</h2>
    <div id="lyrics" class="lyrics"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
